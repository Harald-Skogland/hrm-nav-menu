<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>hrm-nav-menu demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; background: #f5f7f9; }
    .content-area {
      margin: 16px;
      min-height: calc(100vh - 64px - 32px);
      display: flex;
    }
    .page-box {
      flex: 1;
      background: #ffffff;
      border-radius: 4px;
    }

    /* ── Config widget (dev-only tool for menu variant planning) ── */
    .config-widget {
      position: fixed;
      /* Collapsed: shifted so the Config button occupies the same spot
         as the Close button does in the open state (inside widget padding). */
      bottom: 48px;
      right: 48px;
      z-index: 1000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
    }
    .config-content { display: none; }
    .config-widget.open {
      bottom: 32px;
      right: 32px;
      background: #f5f5f7;
      border: 1px solid #d5d5da;
      border-radius: 12px;
      padding: 16px;
      width: 380px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .config-widget.open .config-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .config-widget.open .config-button {
      align-self: flex-end;
    }
    .config-heading {
      font-weight: 600;
      font-size: 13px;
      line-height: 18px;
      color: #1a1a1a;
      margin: 0 0 4px;
    }
    .config-tip {
      font-size: 14px;
      line-height: 20px;
      font-style: italic;
      color: #4a4a4f;
      margin: 4px 0 0;
    }
    .config-tip .config-shortcut {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #ffffff;
      border: 1px solid #d5d5da;
      border-radius: 4px;
      padding: 0 4px;
      font-size: 11px;
      white-space: nowrap;
    }
    .config-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
    }
    .config-row input[type="checkbox"]:disabled {
      cursor: not-allowed;
    }
    .config-row input[type="checkbox"]:disabled + span {
      opacity: 0.45;
    }
    .config-children {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-left: 20px;
      margin-top: 2px;
    }
    .config-columns {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .config-col-presets {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
      min-width: 124px;
    }
    .config-col-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }
    /* Preset lock: content-column checkboxes look disabled but remain clickable.
       Clicking one applies the toggle and switches the preset back to Custom. */
    .config-widget.preset-locked .config-col-content label,
    .config-widget.preset-locked .config-col-content input[type="checkbox"] {
      cursor: not-allowed;
    }
    .config-widget.preset-locked .config-col-content input[type="checkbox"] + span {
      opacity: 0.45;
    }
    .config-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 120px;
      padding: 10px 18px;
      box-sizing: border-box;
      background: #ffffff;
      border: 1px solid #d5d5da;
      border-radius: 9999px;
      color: #1a1a1a;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
      white-space: nowrap;
    }
    .config-button:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.18); }
    .config-icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .config-row.flash-pulse { animation: configFlash 900ms ease-in-out; }
    @keyframes configFlash {
      0%, 33%, 66%, 100% { background-color: transparent; }
      16.5%, 49.5%, 83% { background-color: #fde68a; }
    }
  </style>
  <script src="./hrm-nav-menu.js?v=30" defer></script>
  <script src="./hrm-nav-menu-panel.js?v=30" defer></script>
</head>

    const contentArea = document.getElementById('content-area');

    // ── Breadcrumb: walk HRM_ITEMS ancestors by tier ──────
    // Build nested subtree (direct children of item at `idx`, recursively)
    function buildSubtree(idx) {
      const parentTier = visibleItems[idx].tier || 1;
      const children = [];
      for (let i = idx + 1; i < visibleItems.length; i++) {
        const t = visibleItems[i].tier || 1;
        if (t <= parentTier) break;
        if (t === parentTier + 1) {
          const node = {
            id: visibleItems[i].id,
            label: visibleItems[i].label,
            type: visibleItems[i].type,
          };
          if (visibleItems[i].type === 'submenu') {
            node.children = buildSubtree(i);
          }
          children.push(node);
        }
      }
      return children;
    }

    function findSiblings(id) {
      const idx = visibleItems.findIndex(i => i.id === id);
      if (idx < 0) return [];
      const tier = visibleItems[idx].tier || 1;
      // Parent boundary (first item with tier < current when walking back)
      let parentStart = 0;
      for (let i = idx - 1; i >= 0; i--) {
        if ((visibleItems[i].tier || 1) < tier) { parentStart = i + 1; break; }
      }
      const siblings = [];
      for (let i = parentStart; i < visibleItems.length; i++) {
        const t = visibleItems[i].tier || 1;
        if (t < tier) break;
        if (t === tier && visibleItems[i].id !== id) {
          const node = {
            id: visibleItems[i].id,
            label: visibleItems[i].label,
            type: visibleItems[i].type,
          };
          if (visibleItems[i].type === 'submenu') {
            node.children = buildSubtree(i);
          }
          siblings.push(node);
        }
      }
      return siblings;
    }

    function computeBreadcrumb(id) {
      const idx = visibleItems.findIndex(i => i.id === id);
      if (idx < 0) return [];
      const target = visibleItems[idx];
      const path = [target];
      let needed = (target.tier || 1) - 1;
      for (let i = idx - 1; i >= 0 && needed >= 1; i--) {
        if ((visibleItems[i].tier || 1) === needed) {
          path.unshift(visibleItems[i]);
          needed--;
        }
      }
      return path.map(item => ({
        id: item.id,
        label: item.label,
        siblings: findSiblings(item.id),
      }));
    }

    // ── Page-box variation generator ─────────────────────────
    // Splits the content-area's .page-box into up to 3 horizontal + 3
    // vertical cuts along any path (BSP). Each sub-box ≥ 80px in the
    // split direction, 16px gap between siblings. Seeded by page id so
    // each page has a stable layout across visits.
    const PB_MIN = 80, PB_GAP = 16, PB_MAX_CUTS = 3, PB_MAX_TOTAL = 4, PB_STOP_PROB = 0.25;

    function pbMakeRng(seed) {
      let s = 2166136261;
      for (let i = 0; i < seed.length; i++) {
        s ^= seed.charCodeAt(i);
        s = Math.imul(s, 16777619);
      }
      return function () {
        s |= 0; s = s + 0x6D2B79F5 | 0;
        let t = Math.imul(s ^ s >>> 15, 1 | s);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function pbBuild(w, h, hLeft, vLeft, budget, rng, depth) {
      const canH = hLeft > 0 && h >= PB_MIN * 2 + PB_GAP;
      const canV = vLeft > 0 && w >= PB_MIN * 2 + PB_GAP;
      if (!canH && !canV) return { leaf: true };
      if (budget.n <= 0) return { leaf: true };
      if (depth > 0 && rng() < PB_STOP_PROB) return { leaf: true };

      const dir = (canH && canV) ? (rng() < 0.5 ? 'h' : 'v') : (canH ? 'h' : 'v');
      budget.n -= 1;

      if (dir === 'h') {
        const max = h - PB_GAP - PB_MIN;
        const topH = PB_MIN + rng() * (max - PB_MIN);
        const botH = h - PB_GAP - topH;
        return {
          split: 'column',
          ratios: [topH, botH],
          children: [
            pbBuild(w, topH, hLeft - 1, vLeft, budget, rng, depth + 1),
            pbBuild(w, botH, hLeft - 1, vLeft, budget, rng, depth + 1),
          ],
        };
      }
      const max = w - PB_GAP - PB_MIN;
      const leftW = PB_MIN + rng() * (max - PB_MIN);
      const rightW = w - PB_GAP - leftW;
      return {
        split: 'row',
        ratios: [leftW, rightW],
        children: [
          pbBuild(leftW, h, hLeft, vLeft - 1, budget, rng, depth + 1),
          pbBuild(rightW, h, hLeft, vLeft - 1, budget, rng, depth + 1),
        ],
      };
    }

    function pbRender(node) {
      if (node.leaf) {
        const el = document.createElement('div');
        el.className = 'page-box';
        el.style.flex = '1 1 0';
        return el;
      }
      const wrap = document.createElement('div');
      wrap.className = 'page-split';
      wrap.style.display = 'flex';
      wrap.style.flexDirection = node.split;
      wrap.style.gap = PB_GAP + 'px';
      wrap.style.flex = '1 1 0';
      node.children.forEach((c, i) => {
        const childEl = pbRender(c);
        childEl.style.flex = `${node.ratios[i]} ${node.ratios[i]} 0`;
        wrap.appendChild(childEl);
      });
      return wrap;
    }

    function applyPageVariation(seed) {
      const box = contentArea.querySelector('.page-box');
      if (!box) return;
      const w = contentArea.clientWidth;
      const h = contentArea.clientHeight;
      if (w < PB_MIN || h < PB_MIN) return;
      const rng = pbMakeRng(seed || 'home');
      const tree = pbBuild(w, h, PB_MAX_CUTS, PB_MAX_CUTS, { n: PB_MAX_TOTAL }, rng, 0);
      box.replaceWith(pbRender(tree));
    }

    async function loadPage(id) {
      try {
        const res = await fetch(`./pages/${id}.html`);
        if (!res.ok) throw new Error(`${res.status}`);
        contentArea.innerHTML = await res.text();
        panel.setAttribute('active-item', id);
        nav.setAttribute('breadcrumbs', JSON.stringify(computeBreadcrumb(id)));
        requestAnimationFrame(() => applyPageVariation(id));
      } catch (err) {
        contentArea.innerHTML = `<!-- no page found for ${id} -->`;
        console.warn('page not found:', id, err);
      }
    }

    loadPage('pay-overview');

    // ── Config widget (dev-only menu-variant planner) ─────────
    const configWidget = document.getElementById('config-widget');
    const configButton = document.getElementById('config-button');
    const configLabel  = configButton.querySelector('.config-label');

    // Swap the tip's shortcut label for non-Mac platforms.
    const isMac = (() => {
      const d = navigator.userAgentData;
      if (d && typeof d.platform === 'string') return /mac/i.test(d.platform);
      return /Mac|iPhone|iPod|iPad/i.test(navigator.platform || navigator.userAgent || '');
    })();
    if (!isMac) {
      const sc = configWidget.querySelector('.config-shortcut');
      if (sc) sc.textContent = 'Ctrl+K';
    }

    configButton.addEventListener('click', () => {
      const open = configWidget.classList.toggle('open');
      configLabel.textContent = open ? 'Close' : 'Config';
      configButton.setAttribute('aria-expanded', String(open));
    });

    const configCheckboxes = configWidget.querySelectorAll('input[data-cfg]');
    const configState = {};
    configCheckboxes.forEach(cb => { configState[cb.dataset.cfg] = cb.checked; });

    // Presets — overwrite configState when selected; Custom preserves free-form state.
    const PRESETS = {
      'payroll-admin': {
        approval: true,
        hrm: true,
        'hrm.calendar': true,
        'hrm.employees': true,
        'hrm.expense': true,
        'hrm.payroll': true,
        'hrm.payroll-portal': true,
      },
      'manager': {
        approval: true,
        hrm: true,
        'hrm.calendar': true,
        'hrm.employees': false,
        'hrm.expense': true,
        'hrm.payroll': false,
        'hrm.payroll-portal': true,
      },
    };
    let currentPreset = 'custom';
    let customMemory = null;

    const HRM_CHILD_LABELS = {
      'hrm.calendar':       'Calendar',
      'hrm.employees':      'Employees',
      'hrm.expense':        'Expense',
      'hrm.payroll':        'Payroll',
      'hrm.payroll-portal': 'Payroll Portal',
    };

    function filterItemsByLabel(items, hiddenLabels) {
      const out = [];
      let skipTier = null;
      for (const item of items) {
        const tier = item.tier || 1;
        if (skipTier !== null) {
          if (tier > skipTier) continue;
          skipTier = null;
        }
        if (item.type === 'submenu' && hiddenLabels.has(item.label)) {
          skipTier = tier;
          continue;
        }
        out.push(item);
      }
      return out;
    }

    function applyConfig() {
      // Auto-switch back to HRM if Approval was active but is now disabled.
      if (activeModule === 'approval' && !configState.approval) {
        activeModule = 'hrm';
      }

      // Compute visible items for the active module (HRM honours config; Approval has no config children yet).
      if (activeModule === 'hrm') {
        const hidden = new Set();
        const hrmOn = configState.hrm;
        for (const key in HRM_CHILD_LABELS) {
          const effective = hrmOn && configState[key];
          if (!effective) hidden.add(HRM_CHILD_LABELS[key]);
        }
        visibleItems = filterItemsByLabel(HRM_ITEMS, hidden);
      } else {
        visibleItems = APPROVAL_ITEMS;
      }
      panel.setAttribute('items', JSON.stringify(visibleItems));
      panel.setAttribute('module-name', MODULE_META[activeModule].name);

      // Module-switcher list = options to switch TO (excludes the active one,
      // and Approval is hidden entirely if unchecked in Config).
      const modules = [];
      if (activeModule !== 'hrm')      modules.push({ id: 'hrm',      name: 'HRM' });
      if (activeModule !== 'approval' && configState.approval) {
        modules.push({ id: 'approval', name: 'Approval' });
      }
      panel.setAttribute('modules', JSON.stringify(modules));

      const activeId = panel.getAttribute('active-item');
      if (!activeId || !visibleItems.find(i => i.id === activeId)) {
        const fallback = visibleItems.find(i => i.type === 'link') || { id: MODULE_META[activeModule].defaultId };
        loadPage(fallback.id);
      } else {
        // Active unchanged — refresh breadcrumb (sibling tree may have changed).
        nav.setAttribute('breadcrumbs', JSON.stringify(computeBreadcrumb(activeId)));
      }
    }

    function updateChildEnabledStates() {
      // Native disable only applies in Custom mode; preset-locked uses CSS-only locking.
      const hrmOn = configState.hrm;
      const customMode = currentPreset === 'custom';
      configWidget.querySelectorAll('input[data-cfg^="hrm."]').forEach(cb => {
        cb.disabled = customMode && !hrmOn;
      });
    }

    function syncCheckboxesFromState() {
      configCheckboxes.forEach(cb => {
        const key = cb.dataset.cfg;
        if (key in configState) cb.checked = configState[key];
      });
    }

    function setPreset(newPreset) {
      if (newPreset === currentPreset) return;
      if (newPreset === 'custom') {
        if (customMemory) {
          Object.assign(configState, customMemory);
          customMemory = null;
        }
      } else {
        if (currentPreset === 'custom') {
          customMemory = Object.assign({}, configState);
        }
        Object.assign(configState, PRESETS[newPreset]);
      }
      currentPreset = newPreset;
      syncCheckboxesFromState();
      const radio = configWidget.querySelector(`input[name="preset"][value="${newPreset}"]`);
      if (radio) radio.checked = true;
      configWidget.classList.toggle('preset-locked', newPreset !== 'custom');
      updateChildEnabledStates();
      applyConfig();
    }

    configWidget.querySelectorAll('input[name="preset"]').forEach(r => {
      r.addEventListener('change', () => { if (r.checked) setPreset(r.value); });
    });

    function flashRow(rowEl) {
      if (!rowEl) return;
      rowEl.classList.remove('flash-pulse');
      void rowEl.offsetWidth; // force reflow so the animation can retrigger
      rowEl.classList.add('flash-pulse');
      rowEl.addEventListener('animationend',
        () => rowEl.classList.remove('flash-pulse'),
        { once: true });
    }

    configCheckboxes.forEach(cb => {
      cb.addEventListener('change', () => {
        const key = cb.dataset.cfg;
        const newChecked = cb.checked;

        // Block unchecking the last remaining enabled HRM child; flash parent.
        if (!newChecked && key.startsWith('hrm.') && configState.hrm) {
          const siblings = Array.from(configWidget.querySelectorAll('input[data-cfg^="hrm."]'))
            .filter(other => other !== cb);
          const othersChecked = siblings.some(o => o.checked);
          if (!othersChecked) {
            cb.checked = true;
            flashRow(configWidget.querySelector('[data-row="hrm"]'));
            return;
          }
        }

        configState[key] = newChecked;

        // Clicking a checkbox while a preset is active: accept the toggle
        // and drop back to Custom. The resulting state becomes the new
        // Custom state; no restore from customMemory.
        if (currentPreset !== 'custom') {
          currentPreset = 'custom';
          customMemory = null;
          const customRadio = configWidget.querySelector('input[name="preset"][value="custom"]');
          if (customRadio) customRadio.checked = true;
          configWidget.classList.remove('preset-locked');
        }

        if (key === 'hrm') updateChildEnabledStates();
        applyConfig();
      });
    });

    updateChildEnabledStates();

    panel.addEventListener('hrm-panel-close',      () => panel.removeAttribute('open'));
    panel.addEventListener('hrm-nav-item',         (e) => { console.log('nav item:', e.detail); loadPage(e.detail.id); panel.removeAttribute('open'); });
    panel.addEventListener('hrm-module-toggle',    () => console.log('module switcher toggled'));
    panel.addEventListener('hrm-module-select',    (e) => {
      const id = e.detail && e.detail.id;
      if (id && id !== activeModule && MODULE_META[id]) {
        activeModule = id;
        applyConfig();
        loadPage(MODULE_META[id].defaultId);
      }
    });
    panel.addEventListener('hrm-profile',          () => console.log('my profile clicked'));
    panel.addEventListener('hrm-logout',           () => console.log('log out clicked'));
    panel.addEventListener('hrm-user-panel-toggle',() => console.log('user panel toggled'));
  </script>

</body>
</html>
